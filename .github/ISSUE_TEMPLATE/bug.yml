name: 🐛 Bug Report
description: Report a reproducible bug in nova-password-rotation.
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Minimal steps that trigger the issue (model + trait setup, relevant config, and the request or action).
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package version
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
    validations:
      required: true

  - type: input
    id: nova-version
    attributes:
      label: Laravel & Nova versions
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
    validations:
      required: false
