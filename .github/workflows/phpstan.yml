name: phpstan

on:
  push:
    branches: [main]
    paths: ['**.php', 'phpstan.neon.dist', 'phpstan-baseline.neon']
  pull_request:
    branches: [main]
    paths: ['**.php', 'phpstan.neon.dist', 'phpstan-baseline.neon']

jobs:
  phpstan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Authenticate Nova
        run: composer config http-basic.nova.laravel.com "${{ secrets.NOVA_USERNAME }}" "${{ secrets.NOVA_LICENSE_KEY }}"

      - name: Install Composer dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run PHPStan
        run: composer analyse -- --error-format=github
