name: code-style

on:
  push:
    branches: [main]
    paths: ['**.php', 'pint.json']
  pull_request:
    branches: [main]
    paths: ['**.php', 'pint.json']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check code style with Pint
        uses: aglipanci/laravel-pint-action@2.6
        with:
          args: '--test'
